name: hush_app
description: "HUSH - Geo-acoustic social network"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.2
  firebase_messaging: ^15.2.2

  # Authentication
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Location & Maps
  geolocator: ^14.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Audio
  record: ^6.2.0
  just_audio: ^0.9.43

  # State Management
  provider: ^6.1.4

  # Storage & Utils
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/images/

flutter_native_splash:
  color: "#0D1320"
  image: "assets/images/logo_hushhh.jpeg"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#0D1320"
    image: "assets/images/logo_hushhh.jpeg"
    icon_background_color: "#0D1320"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_hushhh.jpeg"
  min_sdk_android: 23
